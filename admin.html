<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>blog</title>
    <link rel="stylesheet" href="./css/all.css">
    <style>
        body {
            background-color: #f2f3f5;
            font-family: "思源宋体 VF";
        }

        #list {
            margin: auto;
            margin-top: 2rem;
            max-width: 800px;
        }

        .item {
            background-color: white;
            padding-top: 2rem;
            padding-bottom: 2rem;
            padding-left: 2rem;
            padding-right: 2rem;
            border-radius: 15px;
            margin-bottom: 2rem;
            transition-duration: .3s;
        }

        .item-cover {
            max-width: 100%;
            object-fit: cover;
            border-radius: 15px;
        }

        .item-title {
            font-weight: 700;
            color: rgb(55 65 81);
            font-size: 1.25rem;
            line-height: 1.75rem;
        }

        .item-time {
            font-size: .875rem;
            line-height: 1.25rem;
            color: rgb(156 163 175);
        }

        .item-brief {
            line-height: 1.5;
        }
        .item{
display: flex;
flex-direction: row;
        }
        .item-right{
            margin-left: auto;
            display: flex;
            flex-direction: column;
        }
        .button{
            width: 40px;
            height: 40px;
        }
        .button:hover{
            cursor: pointer;
        }
        @media screen and (max-width :1024px) {
            #list {
                margin-left: .75rem;
                margin-right: .75rem;
            }
        }
    </style>
</head>

<body>
    <div id="logo">
        <a href="/"><img src="./img/logo.png" alt=""></a>
    </div>
    <div id="nav">
        <a href="./new.html"><img src="./img/edit.svg" alt=""></a>
        <a id="logout" href><img src="./img/person.svg" alt=""></a>
    </div>
    <div id="list">
    </div>
    <script type="module" src="./script/admin.js"></script>
</body>

</html>
