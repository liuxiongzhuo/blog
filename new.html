<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>edit</title>
    <link rel="stylesheet" href="./css/all.css">
    <link rel="stylesheet" href="./css/markdown.css">
    <style>
        #content {
            height: 300px;
        }

        #main {
            display: flex;
            flex-direction: row;
        }

        #edit input{
            width: 75%;
        }
        #edit textarea {
            width: 100%;
        }

        #edit {
            padding-right: 20px;
        }

        #edit,
        #preview {
            box-sizing: border-box;
            flex: 1;
        }

        @media screen and (max-width:1024px) {
            #main {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>
    <div id="main">
        <div id="edit">

            <div id="coverText">
                <label for="cover">封面</label>
                <input type="text" id="cover">
            </div>
            <div id="titleText">
                <label for="title">标题</label>
                <input type="text" id="title">
            </div>
            <div id="timeText">
                <label for="time">时间</label>
                <input type="text" id="time">
            </div>
            <div id="briefText">
                <label for="brief">简介</label>
                <input type="text" id="brief">
            </div>
            <div id="contentText">
                <label for="content">内容</label>
                <textarea name="" id="content"></textarea>
            </div>
        </div>
        <div class="markdown" id="preview"></div>
    </div>
    <button id="update">新建</button>
    <button id="index" onclick="window.location.href='/admin.html'">返回后台</button>
    <script type="module" src="./script/new.js"></script>
</body>

</html>
