<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>blog</title>
    <link rel="stylesheet" href="./css/all.css">
    <link rel="stylesheet" href="./css/markdown.css">
    <style>
        body {
            background-color: #f2f3f5;
        }
        #post {
            margin: auto;
            margin-top: 1.7rem;
            border-radius: 4px 4px 0 0;
            background-color: #fff;
            padding-top: 1.5rem;
            padding-left: 2rem;
            padding-right: 2rem;
            line-height: 1.75;
            overflow: hidden;
            max-width: 1000px;
        }

        #title {
            font-size: 2.5rem;
            font-weight: 600;
            line-height: 1.3;
            color: #252933;
        }

        #time {
            font-size: 14px;
            color: #8a919f;
        }


        

        @media screen and (max-width:1024px) {

            #title {
                font-size: 2rem;
            }

            #post {
                margin: 0;
                padding-left: 1rem;
                padding-right: 1rem;

                margin-left: 1.7rem;
                margin-right: 1.7rem;
            }
        }
    </style>
</head>

<body>
    <div id="logo">
        <a href="/"><img src="./img/logo.png" alt=""></a>
    </div>
    <div id="nav">
        <a href="/login.html"><img src="./img/person.svg" alt=""></a>
    </div>
    <div id="post">
        <div id="title"></div>
        <div id="time"></div>
        <div id="content" class="markdown"></div>
    </div>
    <script type="module" src="./script/post.js"></script>
</body>

</html>
